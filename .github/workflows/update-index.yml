name: Auto Index

on:
  push:
    branches: [main]
    paths: [pages/]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update index
        run: |
          ls pages/*.html > /tmp/files || true
          CONTENT=""
          for f in pages/*.html; do
            NAME=$(basename "$f" .html)
            CONTENT="$CONTENT<a href=\"$f\" class=\"card\"><div class=\"card-title\">$NAME</div></a>"
          done
          sed -i "s|{{PAGES_INDEX}}|$CONTENT|g" index.html
          
      - name: Commit
        run: |
          git config user.email "a@b.com"
          git config user.name "bot"
          git add -A
          git diff --cached --quiet || git commit -m "update" && git push
