name: Auto Update Index

on:
  push:
    branches: [main]
    paths:
      - pages/

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Update index
        run: |
          cd pages
          LIST=""
          for f in *.html; do
            if [ -f "$f" ]; then
              NAME="${f%.html}"
              LIST="${LIST}<a href=\"pages/$f\" class=\"card\"><div class=\"card-title\">$NAME</div></a>"
            fi
          done
          cd ..
          sed "s|{{PAGES_INDEX}}|$LIST|" index.html > index.new.html
          mv index.new.html index.html
          
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          git commit -m "auto update" || exit 0
          git push
