name: Auto Update Index
on:
  push:
    branches: [main]
    paths:
      - pages/
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate index
        run: python3 -c "
import os,glob
cards=[f'<a href=\"pages/{os.path.basename(f)}\" class=\"card\"><div class=\"card-title\">{os.path.basename(f).replace(\".html\",\"\")}</div></a>'for f in sorted(glob.glob('pages/*.html'))]
c=open('index.html').read()
open('index.html','w').write(c.replace('{{PAGES_INDEX}}',''.join(cards)))
"
      - name: Commit
        run: |
          git config --local user.email "a@g.com"
          git config --local user.name "Bot"
          git add index.html
          git diff --quiet || git commit -m "auto" && git push
