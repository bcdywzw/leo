name: Auto Update Index

on:
  push:
    branches: [main]
    paths:
      - 'pages/**'

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate index
        run: |
          echo "INDEX=" > env.sh
          for f in pages/*.html; do
            if [ -f "$f" ]; then
              name=$(basename "$f" .html)
              echo "<a href=\"pages/$name.html\" class=\"card\"><div class=\"card-title\">$name</div></a>" >> env.sh
            fi
          done
          source env.sh
          if [ -z "$INDEX" ]; then
            sed -i 's/{{PAGES_INDEX}}/<p>暂无页面<\/p>/g' index.html
          else
            sed -i "s/{{PAGES_INDEX}}/$INDEX/g" index.html
          fi

      - name: Commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet || git commit -m "update" && git push
